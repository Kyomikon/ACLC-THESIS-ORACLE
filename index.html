<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AttendEase — School Attendance System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>


  <!-- ============================================================
    COMPONENT: globals.css
    Tokens, reset, shared utilities (buttons, badges, animations)
  ============================================================ -->
  <style id="css-globals">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f6fa;
      --surface:      #ffffff;
      --border:       #dde2ee;
      --text:         #0f1535;
      --muted:        #7880a0;
      --primary:      #c8102e;
      --primary-dark: #a00d24;
      --primary-light:#fff0f2;
      --blue:         #003087;
      --blue-mid:     #1a56c4;
      --blue-light:   #eef2fc;
      --green:        #16a34a;
      --green-light:  #f0fdf4;
      --red:          #c8102e;
      --red-light:    #fff0f2;
      --yellow:       #b45309;
      --yellow-light: #fffbeb;
      --shadow:       0 1px 4px rgba(0,48,135,.08), 0 1px 2px rgba(0,48,135,.04);
      --shadow-md:    0 4px 16px rgba(0,48,135,.12);
      --radius:       12px;
      --radius-sm:    7px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Animations */
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin   { to   { transform:rotate(360deg); } }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; font-family: 'DM Sans', sans-serif; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-blue    { background: var(--blue); color: white; }
    .btn-blue:hover { background: #002060; }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface); color: var(--text); }
    .btn-full    { width: 100%; justify-content: center; padding: 11px 16px; font-size: 14px; font-weight: 600; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
    .badge-green  { background: var(--green-light);  color: var(--green); }
    .badge-red    { background: var(--red-light);    color: var(--red); }
    .badge-yellow { background: var(--yellow-light); color: var(--yellow); }
    .badge-blue   { background: var(--blue-light);   color: var(--blue); }

    /* View toggle */
    .view        { display: none; }
    .view.active { display: flex; }

    /* Loader */
    #global-loader {
      position: fixed; inset: 0; background: rgba(255,255,255,.75);
      display: none; align-items: center; justify-content: center; z-index: 999;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite;
    }

    /* Shared panel */
    .panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden; animation: fadeUp .4s ease both; animation-delay: .2s;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #f0f4ff 0%, #f5f6fa 100%);
    }
    .panel-title { font-size: 14px; font-weight: 700; color: var(--blue); }
    .panel-sub   { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .two-col     { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
    .full-width  { margin-bottom: 24px; }

    /* Shared topbar */
    .topbar      { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; animation: fadeUp .35s ease both; }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-bar  { width: 4px; height: 38px; border-radius: 2px; background: linear-gradient(to bottom, var(--primary), var(--blue-mid)); }
    .page-title  { font-size: 20px; font-weight: 700; letter-spacing: -.4px; color: var(--blue); }
    .page-sub    { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Shared table */
    .table-wrap { overflow-x: auto; }
    table       { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #eef2fc 0%, #f5f6fa 100%);
    }
    tbody tr  { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f4f7fd; }
    tbody td  { padding: 11px 16px; font-size: 13px; }

    /* Status tags */
    .status-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
    .status-tag.present { background: var(--green-light);  color: var(--green); }
    .status-tag.absent  { background: var(--red-light);    color: var(--red); }
    .status-tag.late    { background: var(--yellow-light);  color: var(--yellow); }

    /* Responsive */
    @media (max-width: 900px) { .stats-grid { grid-template-columns: 1fr 1fr; } .two-col { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .sidebar { width: 200px; } .main { margin-left: 200px; padding: 20px 16px; } }
  </style>


  <!-- ============================================================
    COMPONENT: Login.css
    Full-page login card with role tabs
  ============================================================ -->
  <style id="css-login">
    #view-login {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--blue) 0%, #001a5c 50%, var(--primary) 100%);
      align-items: center; justify-content: center; flex-direction: column;
      animation: fadeIn .4s ease;
    }
    .login-card {
      background: white; border-radius: 18px; padding: 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,48,135,.25); animation: fadeUp .45s ease both;
    }
    .login-logo-area {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; margin-bottom: 28px;
    }
    .login-logo-circle {
      width: 72px; height: 72px; border-radius: 50%;
      border: 2.5px dashed #cbd5e1; background: #f8fafc;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s; overflow: hidden; position: relative;
    }
    .login-logo-circle:hover { border-color: var(--blue-mid); background: var(--blue-light); }
    .login-logo-circle img   { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .login-logo-icon  { font-size: 26px; }
    .login-logo-text  { font-size: 9px; color: #94a3b8; font-weight: 500; }
    .login-school-name { font-size: 18px; font-weight: 700; color: var(--blue); letter-spacing: -.3px; text-align: center; }
    .login-school-sub  { font-size: 12px; color: var(--muted); text-align: center; }

    .login-tabs { display: flex; background: var(--bg); border-radius: 9px; padding: 4px; gap: 3px; margin-bottom: 24px; }
    .login-tab  {
      flex: 1; padding: 8px 6px; border-radius: 7px; text-align: center;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--muted);
      transition: all .15s; user-select: none; border: none; background: transparent;
    }
    .login-tab.active { background: white; color: var(--blue); box-shadow: var(--shadow); }

    .login-form  { display: flex; flex-direction: column; gap: 14px; }
    .form-group  { display: flex; flex-direction: column; gap: 5px; }
    .form-label  { font-size: 12px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: .4px; }
    .form-input  {
      padding: 10px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text);
      outline: none; transition: border-color .15s; background: white;
    }
    .form-input:focus { border-color: var(--blue-mid); }
    .form-input.error { border-color: var(--primary); }

    .login-error {
      background: var(--red-light); color: var(--primary); border: 1px solid #ffc0cb;
      border-radius: var(--radius-sm); padding: 9px 13px; font-size: 12px; font-weight: 500;
      display: none;
    }
    .login-error.visible { display: block; }
    .login-hint      { font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px; }
    .login-hint span { color: var(--blue); font-weight: 600; }
  </style>


  <!-- ============================================================
    COMPONENT: Sidebar.css
    Fixed left nav with logo, nav items, section-switcher, user footer
  ============================================================ -->
  <style id="css-sidebar">
    #view-app { min-height: 100vh; flex-direction: row; }

    .sidebar {
      width: 230px; background: var(--blue);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
      box-shadow: 2px 0 14px rgba(0,48,135,.22);
    }

    /* Logo area */
    .school-logo-section {
      padding: 18px 16px 14px; border-bottom: 1px solid rgba(255,255,255,.12);
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .logo-upload-area {
      width: 68px; height: 68px; border-radius: 50%;
      border: 2.5px dashed rgba(255,255,255,.35); background: rgba(255,255,255,.08);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s; overflow: hidden; position: relative;
    }
    .logo-upload-area:hover { border-color: rgba(255,255,255,.75); background: rgba(255,255,255,.14); }
    .logo-upload-area img   { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
    .logo-ph-icon { font-size: 22px; }
    .logo-ph-text { font-size: 9px; color: rgba(255,255,255,.5); font-weight: 500; text-align: center; line-height: 1.3; }
    .logo-remove-btn {
      display: none; position: absolute; top: 2px; right: 2px;
      background: var(--primary); color: white; border: none; border-radius: 50%;
      width: 18px; height: 18px; font-size: 10px; font-weight: 700;
      cursor: pointer; align-items: center; justify-content: center;
    }
    .logo-upload-area:hover .logo-remove-btn.visible { display: flex; }
    .sidebar-school-name { font-size: 13px; font-weight: 700; color: white; text-align: center; letter-spacing: -.2px; }
    .sidebar-school-sub  { font-size: 10px; color: rgba(255,255,255,.48); text-align: center; }

    /* Role pill */
    .role-pill    { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
    .role-admin   { background: rgba(200,16,46,.25);   color: #ffb3bf; }
    .role-teacher { background: rgba(255,255,255,.15);  color: rgba(255,255,255,.85); }
    .role-student { background: rgba(26,86,196,.35);    color: #a8c4ff; }

    /* Teacher section switcher */
    .section-switcher { margin: 0 10px 6px; background: rgba(255,255,255,.07); border-radius: 8px; padding: 8px 10px; }
    .section-switcher label  { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: rgba(255,255,255,.35); display: block; margin-bottom: 4px; }
    .section-switcher select { width: 100%; background: transparent; border: none; color: rgba(255,255,255,.8); font-size: 12px; font-weight: 500; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; }
    .section-switcher select option { background: var(--blue); color: white; }

    /* Nav items */
    .sidebar-nav   { flex: 1; padding: 10px; overflow-y: auto; }
    .nav-section   { margin-bottom: 16px; }
    .nav-label     { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.35); padding: 0 10px 5px; display: block; }
    .nav-item      { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; cursor: pointer; color: rgba(255,255,255,.6); font-size: 13px; font-weight: 500; transition: all .15s; user-select: none; }
    .nav-item:hover  { background: rgba(255,255,255,.09); color: white; }
    .nav-item.active { background: var(--primary); color: white; }
    .nav-icon      { font-size: 14px; width: 18px; text-align: center; }

    /* User footer */
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.1); }
    .user-card      { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; }
    .sidebar-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; border: 2px solid rgba(255,255,255,.2); }
    .u-name  { font-size: 13px; font-weight: 600; color: white; }
    .u-role  { font-size: 10px; color: rgba(255,255,255,.45); text-transform: capitalize; }
    .logout-btn {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
      padding: 7px 10px; border-radius: 7px; cursor: pointer;
      color: rgba(255,255,255,.5); font-size: 12px; font-weight: 500;
      transition: all .15s; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; width: 100%;
    }
    .logout-btn:hover { background: rgba(200,16,46,.2); color: #ffb3bf; }

    /* Main content offset */
    .main { margin-left: 230px; flex: 1; padding: 28px 32px; min-height: 100vh; }
  </style>


  <!-- ============================================================
    COMPONENT: StatsCards.css
    4-column stat cards for dashboard
  ============================================================ -->
  <style id="css-stats-cards">
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow); animation: fadeUp .4s ease both;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; border-radius: var(--radius) var(--radius) 0 0;
    }
    .stat-card:nth-child(1)::before { background: var(--blue); }
    .stat-card:nth-child(2)::before { background: var(--green); }
    .stat-card:nth-child(3)::before { background: var(--primary); }
    .stat-card:nth-child(4)::before { background: var(--yellow); }
    .stat-card:nth-child(1) { animation-delay: .05s; }
    .stat-card:nth-child(2) { animation-delay: .10s; }
    .stat-card:nth-child(3) { animation-delay: .15s; }
    .stat-card:nth-child(4) { animation-delay: .20s; }

    .stat-icon  { font-size: 20px; margin-bottom: 10px; display: block; }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -.8px; font-family: 'DM Mono', monospace; }
    .stat-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 20px; margin-top: 10px; }
  </style>


  <!-- ============================================================
    COMPONENT: Charts.css
    Bar chart (weekly) + donut chart (today's breakdown)
  ============================================================ -->
  <style id="css-charts">
    .chart-area { padding: 16px 20px 20px; }

    /* Bar chart */
    .bar-chart  { display: flex; align-items: flex-end; gap: 8px; height: 110px; }
    .bar-group  { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
    .bar        { width: 100%; border-radius: 4px 4px 0 0; transition: opacity .2s; cursor: pointer; }
    .bar:hover  { opacity: .75; }
    .bar-label  { font-size: 10px; color: var(--muted); font-weight: 500; }
    .bar-val    { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* Donut chart */
    .donut-wrap   { display: flex; align-items: center; gap: 24px; padding: 16px 20px 20px; }
    .donut-legend { display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .legend-item  { display: flex; align-items: center; gap: 10px; }
    .legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 12px; color: var(--muted); flex: 1; }
    .legend-val   { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .legend-pct   { font-size: 11px; color: var(--muted); margin-left: 4px; }
  </style>


  <!-- ============================================================
    COMPONENT: AttendanceTable.css
    Section tabs, date tabs, student rows, status selects
  ============================================================ -->
  <style id="css-attendance-table">
    /* Section tabs */
    .class-tabs { display: flex; gap: 6px; padding: 14px 20px 0; flex-wrap: wrap; }
    .class-tab  { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--muted); transition: all .15s; user-select: none; }
    .class-tab.active          { background: var(--blue); color: white; border-color: var(--blue); }
    .class-tab:hover:not(.active) { color: var(--blue); border-color: var(--blue-mid); }

    /* Date tabs */
    .date-tabs  { display: flex; gap: 6px; padding: 12px 20px 14px; overflow-x: auto; }
    .date-tab   { display: flex; flex-direction: column; align-items: center; padding: 8px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); min-width: 52px; transition: all .15s; user-select: none; }
    .date-tab:hover  { border-color: var(--blue-mid); }
    .date-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .date-tab .day-name { font-size: 10px; font-weight: 600; text-transform: uppercase; opacity: .7; }
    .date-tab .day-num  { font-size: 16px; font-weight: 700; margin-top: 2px; }

    /* Toolbar + search */
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 14px; }
    .search-bar    { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); transition: border-color .15s; }
    .search-bar:focus-within { border-color: var(--blue-mid); }
    .search-bar input { border: none; background: transparent; outline: none; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); width: 200px; }
    .search-bar input::placeholder { color: var(--muted); }

    /* Student rows */
    .student-info   { display: flex; align-items: center; gap: 10px; }
    .student-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; flex-shrink: 0; }

    /* Status dropdowns */
    .status-select {
      font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 600;
      border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 8px;
      background: var(--bg); cursor: pointer; outline: none; transition: all .15s;
    }
    .status-select:focus          { border-color: var(--blue-mid); }
    .status-select.present { background: var(--green-light);  color: var(--green);  border-color: #bbf7d0; }
    .status-select.absent  { background: var(--red-light);    color: var(--red);    border-color: #ffc0cb; }
    .status-select.late    { background: var(--yellow-light);  color: var(--yellow); border-color: #fde68a; }

    /* Table footer */
    .table-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-top: 1px solid var(--border); background: var(--bg); }
    .save-hint         { font-size: 11px; color: var(--muted); }
    .save-hint.unsaved { color: var(--yellow); font-weight: 600; }
    .save-hint.saved   { color: var(--green);  font-weight: 600; }
  </style>


  <!-- ============================================================
    COMPONENT: StudentRecord.css
    Profile card, summary grid, rate bar, history table
  ============================================================ -->
  <style id="css-student-record">
    .student-profile-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px;
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 20px; box-shadow: var(--shadow); animation: fadeUp .4s ease both;
    }
    .profile-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue-mid));
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; flex-shrink: 0;
    }
    .profile-name { font-size: 18px; font-weight: 700; color: var(--text); }
    .profile-id   { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin: 2px 0 8px; }
    .profile-meta { display: flex; gap: 6px; flex-wrap: wrap; }

    .attendance-summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; text-align: center;
      box-shadow: var(--shadow); animation: fadeUp .4s ease both;
    }
    .summary-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .summary-num   { font-size: 32px; font-weight: 700; font-family: 'DM Mono', monospace; margin-bottom: 8px; }

    .attendance-rate-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow);
    }
    .rate-label { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; font-weight: 600; }

<!-- ============================================================
  JS: api.js
  Central fetch helper — all calls go through here
============================================================ -->
<script id="js-api">
const API = {
  async call(endpoint, method = 'GET', body = null) {
    const opts = {
      method,
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);
    const res  = await fetch('/api/' + endpoint, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  },
};
</script>

<!-- ============================================================
  JS: auth.js
  Login, logout, session restore, show-app bootstrap
============================================================ -->
<script id="js-auth">
const Auth = {
  // Switch role tab on the login card
  switchRole(role, btn) {
    State.currentRole = role;
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('login-id-label').textContent =
      role === 'student' ? 'Student ID (USN)' : 'Username';
    document.getElementById('login-username').placeholder =
      role === 'student' ? 'e.g. 2024-00101' : 'Enter your username';
    document.getElementById('login-error').classList.remove('visible');
    ['login-username', 'login-password'].forEach(id =>
      document.getElementById(id).classList.remove('error')
    );
  },

  async doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');

    errEl.classList.remove('visible');
    if (!username || !password) {
      errEl.textContent = 'Please enter your credentials.';
      errEl.classList.add('visible');
      return;
    }

    btn.textContent = 'Signing in…';
    btn.disabled    = true;
    try {
      const data = await API.call('login', 'POST', {
        username, password, role: State.currentRole,
      });
      State.currentUser = data.user;
      await this._showApp();
    } catch (err) {
      errEl.textContent = err.message || 'Incorrect credentials.';
      errEl.classList.add('visible');
      ['login-username', 'login-password'].forEach(id =>
        document.getElementById(id).classList.add('error')
      );
    } finally {
      btn.textContent = 'Sign In →';
      btn.disabled    = false;
    }
  },

  async doLogout() {
    Loader.show();
    try { await API.call('logout', 'POST'); } catch (_) {}
    State.currentUser = null;
    State.sections    = [];
    State.activePage  = 'dashboard';
    document.getElementById('view-app').classList.remove('active');
    document.getElementById('view-login').classList.add('active');
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    Loader.hide();
  },

  // Called after successful login OR session restore
  async _showApp() {
    Loader.show();

    // Load sections list
    try {
      const d = await API.call('sections');
      State.sections = d.sections;
    } catch (_) {
      State.sections = [];
    }

    // Switch views
    document.getElementById('view-login').classList.remove('active');
    document.getElementById('view-app').classList.add('active');

    // Populate sidebar identity
    Sidebar.populate(State.currentUser);

    // Render nav + first page
    Router.renderSidebar();
    await Router.renderPage();
    Loader.hide();
  },

  // Restore session on hard refresh
  async restoreSession() {
    try {
      const d = await API.call('me');
      State.currentUser = d.user;
      await this._showApp();
    } catch (_) {
      // Not logged in — login screen is already visible
    }
  },
};
</script>

<!-- ============================================================
  JS: Charts.js
  Bar chart (weekly) + SVG donut chart (today's breakdown)
============================================================ -->
<script id="js-charts">
const Charts = {
  renderBar(rows) {
    const el = document.getElementById('bar-chart');
    if (!el) return;

    if (!rows.length) {
      el.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:20px">No chart data yet.</div>';
      return;
    }

    const max  = Math.max(...rows.map(r =>
      Math.max(Number(r.present)||0, Number(r.absent)||0, Number(r.late)||0)
    ), 1);
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    el.innerHTML = rows.map(r => {
      const d   = new Date(r.date + 'T00:00:00');
      const p   = Math.round((Number(r.present) || 0) / max * 100);
      const a   = Math.round((Number(r.absent)  || 0) / max * 100);
      const l   = Math.round((Number(r.late)    || 0) / max * 100);
      const tot = (Number(r.present)||0) + (Number(r.absent)||0) + (Number(r.late)||0);

      return `
        <div class="bar-group">
          <div class="bar-val">${tot}</div>
          <div style="display:flex;gap:2px;align-items:flex-end;height:80px;width:100%">
            <div class="bar" style="height:${p}%;background:var(--green);flex:1"  title="Present: ${r.present}"></div>
            <div class="bar" style="height:${a}%;background:var(--red);flex:1"    title="Absent: ${r.absent}"></div>
            <div class="bar" style="height:${l}%;background:var(--yellow);flex:1" title="Late: ${r.late}"></div>
          </div>
          <div class="bar-label">${days[d.getDay()]}</div>
        </div>`;
    }).join('');
  },

  renderDonut(present, absent, late) {
    const svg = document.getElementById('donut-svg');
    const leg = document.getElementById('donut-legend');
    if (!svg || !leg) return;
    svg.innerHTML = '';

    const data = [
      { label: 'Present', value: present, color: '#16a34a' },
      { label: 'Absent',  value: absent,  color: '#c8102e' },
      { label: 'Late',    value: late,    color: '#b45309' },
    ];
    const total = data.reduce((a, b) => a + b.value, 0);

    if (!total) {
      svg.innerHTML = '<circle cx="55" cy="55" r="40" fill="none" stroke="#dde2ee" stroke-width="14"/>';
      leg.innerHTML = '<div style="color:var(--muted);font-size:12px">No data today.</div>';
      return;
    }

    const arc = (cx, cy, r, start, end) => {
      const s = (start - 90) * Math.PI / 180;
      const e = (end   - 90) * Math.PI / 180;
      return `M ${cx + r * Math.cos(s)} ${cy + r * Math.sin(s)}
              A ${r} ${r} 0 ${end - start > 180 ? 1 : 0} 1
              ${cx + r * Math.cos(e)} ${cy + r * Math.sin(e)}`;
    };

    let cur = 0;
    data.forEach(d => {
      const deg = (d.value / total) * 360;
      const p   = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('d',              arc(55, 55, 40, cur, cur + deg - 1.5));
      p.setAttribute('fill',           'none');
      p.setAttribute('stroke',         d.color);
      p.setAttribute('stroke-width',   '14');
      p.setAttribute('stroke-linecap', 'round');
      svg.appendChild(p);
      cur += deg;
    });

    leg.innerHTML = data.map(d => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${d.color}"></div>
        <span class="legend-label">${d.label}</span>
        <span class="legend-val">${d.value}</span>
        <span class="legend-pct">${((d.value / total) * 100).toFixed(1)}%</span>
      </div>`).join('');
  },
};
</script>


<!-- ============================================================
  JS: AttendanceTable.js
  Section tabs, date tabs, student rows, mark + save logic
============================================================ -->
<script id="js-attendance-table">
const AttendanceTable = {
  // Internal state
  _loaded:    [],
  _filtered:  [],
  _section:   null,
  _date:      new Date().toISOString().split('T')[0],
  _readOnly:  false,

  // ── HTML builders ────────────────────────────────────────────
  buildHTML(readOnly = false) {
    const isTeacher = State.currentUser.role === 'teacher';
    const grouped   = {};
    State.sections.forEach(s => {
      const key = (s.strand || 'Other') + (s.year_level ? ' Gr.' + s.year_level : '');
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(s);
    });

    return `
      <div class="panel full-width" id="attendance-panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">${readOnly ? 'Attendance Records' : 'Mark Attendance'}</div>
            <div class="panel-sub" id="att-date-label">Loading…</div>
          </div>
          ${!readOnly ? `
            <div style="display:flex;gap:8px;">
              <button class="btn btn-ghost" onclick="AttendanceTable.markAll('present')">✓ All Present</button>
              <button class="btn btn-ghost" onclick="AttendanceTable.markAll('absent')">✗ All Absent</button>
              <button class="btn btn-primary" onclick="AttendanceTable.save()">💾 Save</button>
            </div>` : ''}
        </div>

        ${!isTeacher && State.sections.length > 1 ? `
          <div style="padding:14px 20px 0;">
            ${Object.entries(grouped).map(([group, secs]) => `
              <div style="margin-bottom:8px;">
                <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;">${group}</div>
                <div class="class-tabs" style="padding:0;">
                  ${secs.map((s, i) => `
                    <div class="class-tab ${i === 0 && !this._section || s.name === this._section ? 'active' : ''}"
                         onclick="AttendanceTable.switchSection('${s.name}', this)">
                      ${s.name}
                      <span style="opacity:.6;font-size:10px">(${s.student_count || 0})</span>
                    </div>`).join('')}
                </div>
              </div>`).join('')}
          </div>` : ''}

        <div class="date-tabs" id="date-tabs"></div>

        <div class="table-toolbar">
          <div class="search-bar">
            <span style="color:var(--muted)">🔍</span>
            <input type="text" placeholder="Search name, USN or LRN…"
                   oninput="AttendanceTable.filter(this.value)"/>
          </div>
          <div style="font-size:12px;color:var(--muted)" id="count-label">Loading…</div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Student</th>
                <th>USN</th>
                <th>LRN</th>
                ${!isTeacher ? '<th>Section</th>' : ''}
                <th>Status</th>
                <th>Time In</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody id="student-tbody">
              <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">Loading…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer">
          <span class="save-hint" id="save-hint">No changes</span>
          <span style="font-size:12px;color:var(--muted)">
            <span style="color:var(--green)">■</span> Present &nbsp;
            <span style="color:var(--primary)">■</span> Absent &nbsp;
            <span style="color:var(--yellow)">■</span> Late
          </span>
        </div>
      </div>`;
  },

  buildPage() {
    const lbl = State.currentUser.role === 'teacher'
      ? State.currentUser.section_name : 'All Sections';
    return `
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-bar"></div>
          <div>
            <div class="page-title">Mark Attendance</div>
            <div class="page-sub">${lbl}</div>
          </div>
        </div>
      </div>
      ${this.buildHTML(false)}`;
  },

  buildRecordsPage() {
    const isAdmin = State.currentUser.role === 'admin';
    return `
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-bar"></div>
          <div>
            <div class="page-title">${isAdmin ? 'All Records' : 'Section Records'}</div>
            <div class="page-sub">AY 2025–2026</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost">⬇ Export CSV</button>
          ${isAdmin ? '<button class="btn btn-primary">+ Add Student</button>' : ''}
        </div>
      </div>
      ${this.buildHTML(true)}`;
  },

  // ── Initialise ───────────────────────────────────────────────
  async init(readOnly = false) {
    this._readOnly = readOnly;
    this._section  = State.currentUser.role === 'teacher'
      ? State.currentUser.section
      : (State.sections[0]?.name || null);
    this._buildDateTabs();
    await this._load();
  },

  // ── Date tabs ────────────────────────────────────────────────
  _buildDateTabs() {
    const el = document.getElementById('date-tabs');
    if (!el) return;
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let html = '';
    for (let i = 6; i >= 0; i--) {
      const d   = new Date();
      d.setDate(d.getDate() - i);
      const iso = d.toISOString().split('T')[0];
      html += `
        <div class="date-tab ${iso === this._date ? 'active' : ''}"
             onclick="AttendanceTable.switchDate('${iso}', this)">
          <span class="day-name">${days[d.getDay()]}</span>
          <span class="day-num">${d.getDate()}</span>
        </div>`;
    }
    el.innerHTML = html;
    this._updateDateLabel();
  },

  _updateDateLabel() {
    const el = document.getElementById('att-date-label');
    if (!el) return;
    el.textContent = new Date(this._date + 'T00:00:00').toLocaleDateString('en-PH', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    });
  },

  // ── Load students from API ───────────────────────────────────
  async _load() {
    const tb = document.getElementById('student-tbody');
    if (tb) tb.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;">
      <div class="spinner" style="margin:0 auto"></div></td></tr>`;

    if (!this._section) {
      if (tb) tb.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">No section selected.</td></tr>`;
      return;
    }

    try {
      const data = await API.call(
        `students?section=${encodeURIComponent(this._section)}&date=${this._date}`
      );
      this._loaded   = data.students || [];
      this._filtered = [...this._loaded];
      this._renderRows(this._filtered);
      this._updateCount();
      this._setHint('none');
    } catch (err) {
      if (tb) tb.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--primary)">Error: ${err.message}</td></tr>`;
    }
  },

  // ── Section / date switches ──────────────────────────────────
  async switchSection(name, btn) {
    document.querySelectorAll('.class-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    this._section = name;
    await this._load();
  },

  async switchDate(iso, btn) {
    document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    this._date = iso;
    this._updateDateLabel();
    await this._load();
  },

  // ── Search filter ────────────────────────────────────────────
  filter(q) {
    const lq = q.toLowerCase();
    this._filtered = this._loaded.filter(s =>
      (s.full_name || '').toLowerCase().includes(lq) ||
      (s.usn       || '').toLowerCase().includes(lq) ||
      (s.lrn       || '').toLowerCase().includes(lq)
    );
    this._renderRows(this._filtered);
    this._updateCount();
  },

  // ── Render table rows ────────────────────────────────────────
  _renderRows(list) {
    const tb = document.getElementById('student-tbody');
    if (!tb) return;
    const isTeacher = State.currentUser.role === 'teacher';

    if (!list.length) {
      tb.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">No students found.</td></tr>`;
      return;
    }

    tb.innerHTML = list.map((s, i) => {
      const ini    = ((s.first_name || '').charAt(0) + (s.last_name || '').charAt(0)).toUpperCase();
      const color  = AVATAR_COLORS[i % AVATAR_COLORS.length];
      const status = s.status || 'absent';

      const statusEl = this._readOnly
        ? `<span class="status-tag ${status}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>`
        : `<select class="status-select ${status}" data-usn="${s.usn}"
                   onchange="AttendanceTable.onStatusChange(this)">
             <option value="present" ${status === 'present' ? 'selected' : ''}>✅ Present</option>
             <option value="absent"  ${status === 'absent'  ? 'selected' : ''}>❌ Absent</option>
             <option value="late"    ${status === 'late'    ? 'selected' : ''}>🕐 Late</option>
           </select>`;

      return `
        <tr>
          <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${String(i + 1).padStart(2, '0')}</td>
          <td>
            <div class="student-info">
              <div class="student-avatar" style="background:${color}">${ini}</div>
              <div>
                <div style="font-weight:600">${s.full_name}</div>
                ${s.middle_name ? `<div style="font-size:11px;color:var(--muted)">${s.middle_name}</div>` : ''}
              </div>
            </div>
          </td>
          <td style="font-family:'DM Mono',monospace;font-size:12px">${s.usn}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${s.lrn || '—'}</td>
          ${!isTeacher ? `<td><span class="badge badge-blue">${s.section}</span></td>` : ''}
          <td>${statusEl}</td>
          <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${s.time_in || '—'}</td>
          <td style="font-size:12px;color:var(--muted)">${s.remarks || ''}</td>
        </tr>`;
    }).join('');
  },

  // ── Mark-all shortcut ────────────────────────────────────────
  markAll(status) {
    document.querySelectorAll('.status-select').forEach(sel => {
      sel.value     = status;
      sel.className = 'status-select ' + status;
    });
    this._setHint('unsaved');
  },

  onStatusChange(sel) {
    sel.className = 'status-select ' + sel.value;
    this._setHint('unsaved');
  },

  // ── Save attendance ──────────────────────────────────────────
  async save() {
    const selects = document.querySelectorAll('.status-select');
    if (!selects.length) return;

    const records = [];
    selects.forEach(sel => {
      const stu = this._loaded.find(s => s.usn === sel.dataset.usn);
      if (stu) records.push({ student_id: stu.id, status: sel.value });
    });

    const btn = document.querySelector('[onclick="AttendanceTable.save()"]');
    if (btn) { btn.textContent = '💾 Saving…'; btn.disabled = true; }

    try {
      await API.call('attendance', 'POST', { date: this._date, records });
      this._setHint('saved');
      await this._load();  // reload to get stored time_in from DB
    } catch (err) {
      alert('Save failed: ' + err.message);
      this._setHint('unsaved');
    } finally {
      if (btn) { btn.textContent = '💾 Save'; btn.disabled = false; }
    }
  },

  // ── Helpers ──────────────────────────────────────────────────
  _updateCount() {
    const el = document.getElementById('count-label');
    if (!el) return;
    el.textContent = `${this._filtered.length} student${this._filtered.length !== 1 ? 's' : ''} · ${this._section || ''}`;
  },

  _setHint(state) {
    const el = document.getElementById('save-hint');
    if (!el) return;
    if (state === 'unsaved') { el.className = 'save-hint unsaved'; el.textContent = '⚠ Unsaved changes'; }
    else if (state === 'saved') { el.className = 'save-hint saved'; el.textContent = '✓ Saved successfully'; }
    else { el.className = 'save-hint'; el.textContent = 'No changes'; }
  },
};
</script>


<!-- ============================================================
  JS: StudentRecord.js
  Full monthly attendance view for students
============================================================ -->
<script id="js-student-record">
const StudentRecord = {
  async render() {
    const main = document.getElementById('main-content');
    const user = State.currentUser;
    const usn  = user.usn;

    let history = [];
    let summary = { present: 0, absent: 0, late: 0, total: 0, rate: 0 };
    let profile = null;

    try {
      const d = await API.call(`attendance?usn=${encodeURIComponent(usn)}&days=30`);
      history = d.history  || [];
      summary = d.summary  || summary;
    } catch (_) {}

    try {
      const d = await API.call(`students?usn=${encodeURIComponent(usn)}`);
      profile = d.student;
    } catch (_) {}

    const fullName = profile
      ? `${profile.last_name}, ${profile.first_name}${profile.middle_name ? ' ' + profile.middle_name : ''}`
      : user.name;

    const rateColor = summary.rate >= 90 ? 'var(--green)'
                    : summary.rate >= 75 ? 'var(--yellow)'
                    :                      'var(--primary)';
    const rateMsg   = summary.rate >= 90 ? '✅ Excellent attendance!'
                    : summary.rate >= 75 ? '⚠️ Attendance acceptable – aim higher.'
                    :                      '❌ Attendance is below the required threshold.';

    main.innerHTML = `
      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-bar"></div>
          <div>
            <div class="page-title">My Attendance</div>
            <div class="page-sub">AY 2025–2026 · ${user.section_name || ''}</div>
          </div>
        </div>
        <button class="btn btn-ghost">⬇ Download Record</button>
      </div>

      <!-- Profile card -->
      <div class="student-profile-card">
        <div class="profile-avatar">${user.initials}</div>
        <div>
          <div class="profile-name">${fullName}</div>
          <div class="profile-id">${usn}${profile?.lrn ? ' · LRN: ' + profile.lrn : ''}</div>
          <div class="profile-meta">
            <span class="badge badge-blue">${user.section_name || ''}</span>
            ${profile?.sex ? `<span class="badge badge-blue">${profile.sex}</span>` : ''}
            ${profile?.age ? `<span class="badge badge-blue">Age ${profile.age}</span>` : ''}
          </div>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="attendance-summary-grid">
        <div class="summary-card">
          <div class="summary-label">Present</div>
          <div class="summary-num" style="color:var(--green)">${summary.present}</div>
          <span class="badge badge-green">${summary.total > 0 ? Math.round(summary.present / summary.total * 100) : 0}%</span>
        </div>
        <div class="summary-card">
          <div class="summary-label">Absent</div>
          <div class="summary-num" style="color:var(--primary)">${summary.absent}</div>
          <span class="badge badge-red">${summary.total > 0 ? Math.round(summary.absent / summary.total * 100) : 0}%</span>
        </div>
        <div class="summary-card">
          <div class="summary-label">Late</div>
          <div class="summary-num" style="color:var(--yellow)">${summary.late}</div>
          <span class="badge badge-yellow">${summary.total > 0 ? Math.round(summary.late / summary.total * 100) : 0}%</span>
        </div>
      </div>

      <!-- Rate bar -->
      <div class="attendance-rate-bar">
        <div class="rate-label">
          <span>Attendance Rate · last ${summary.total} recorded days</span>
          <span style="font-family:'DM Mono',monospace;color:${rateColor}">${summary.rate}%</span>
        </div>
        <div class="rate-track">
          <div class="rate-fill" id="rate-fill" style="width:0%"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">${rateMsg}</div>
      </div>

      <!-- History table -->
      <div class="panel full-width">
        <div class="panel-header">
          <div>
            <div class="panel-title">Attendance History</div>
            <div class="panel-sub">Last 30 recorded school days</div>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>#</th><th>Date</th><th>Status</th><th>Time In</th><th>Remarks</th></tr>
            </thead>
            <tbody>
              ${history.length
                ? history.map((r, i) => `
                    <tr>
                      <td style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${String(i + 1).padStart(2, '0')}</td>
                      <td style="font-weight:500">${new Date(r.date + 'T00:00:00').toLocaleDateString('en-PH', { weekday:'short', month:'short', day:'numeric', year:'numeric' })}</td>
                      <td><span class="status-tag ${r.status}">${r.status.charAt(0).toUpperCase() + r.status.slice(1)}</span></td>
                      <td style="font-family:'DM Mono',monospace;font-size:12px;color:${!r.time_in ? 'var(--muted)' : 'var(--text)'}">${r.time_in || '—'}</td>
                      <td style="font-size:12px;color:var(--muted)">${r.remarks || ''}</td>
                    </tr>`).join('')
                : `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted)">No attendance records yet.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>`;

    // Animate rate bar
    setTimeout(() => {
      const fill = document.getElementById('rate-fill');
      if (fill) fill.style.width = summary.rate + '%';
    }, 80);
  },
};
</script>
